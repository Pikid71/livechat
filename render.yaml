services:
  - type: web
    name: black-hole-chat-v2
    runtime: node
    repo: https://github.com/yourusername/black-hole-chat-v2
    plan: free
    region: oregon
    branch: main
    buildCommand: |
      npm install
      npm install bcryptjs express socket.io mongoose multer sharp dotenv
      mkdir -p uploads
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      # Node Environment
      - key: NODE_ENV
        value: production
      
      # Server Port
      - key: PORT
        value: 3000
      
      # MongoDB Connection
      - key: MONGODB_URI
        value: mongodb+srv://livechatdb:A%40sh1shmongodb@cluster0.j2qik61.mongodb.net/blackholechat?retryWrites=true&w=majority
      
      # File Upload Settings
      - key: MAX_FILE_SIZE
        value: 52428800
      - key: UPLOAD_PATH
        value: ./uploads
      
      # Owner username is defined via OWNER_USERNAME (email not used)
      - key: OWNER_USERNAME
        value: Pi_Kid71
      # Default owner password (used to auto-create owner account)
      - key: OWNER_PASSWORD
        value: A@sh1shlivechat
      # Admin password for reset script (cleardata.js)
      - key: ADMIN_PASSWORD
        value: A@sh1shlivechat
      
      # OpenRouter AI API Key
      - key: OPENROUTER_API_KEY
        value: <your_openrouter_key_here>
      
      # DeAPI.ai Image Generation API Key
      - key: DEAPI_API_KEY
        value: <your_deapi_key_here>
      
      # Stable Horde API Key (optional backup)
      - key: STABLE_HORDE_API_KEY
        value: <your_stable_horde_key_here>
    
    disk:
      name: uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1

databases:
  - name: blackhole-chat-db
    plan: free
    region: oregon