# Black Hole Chat V2 - Render Deployment Configuration
# Features: Private messaging, Voice/Video Chat, File Sharing
# Message Backup, Web Notifications, Image Generation (Stable Horde)
# Rank System, File Upload, Admin/Moderator Commands

services:
  # Main Web Service
  - type: web
    name: black-hole-chat-v2
    runtime: node
    repo: https://github.com/Pikid71/livechat
    branch: main
    plan: free
    
    # Build and start commands
    buildCommand: npm install
    startCommand: node server.js
    
    # Health check path
    healthCheckPath: /health
    
    # Environment variables
    envVars:
      - key: NODE_ENV
        value: production
      
      - key: MONGODB_URI
        value: mongodb+srv://livechatdb:A%40sh1shmongodb@cluster0.j2qik61.mongodb.net/blackholechat?retryWrites=true&w=majority
        sync: false
      
      - key: ADMIN_PASSWORD
        value: A@sh1shlivechat
        sync: false
      
      - key: OWNER_USERNAME
        value: Pi_Kid71
        sync: false
      
      - key: PORT
        value: 10000
      
      - key: ENABLE_WEBRTC
        value: true
      
      - key: MAX_FILE_SIZE
        value: 52428800
      
      # OpenRouter AI API Key
      - key: OPENROUTER_API_KEY
        value: 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
        sync: false
      
      # DeAPI.ai Image Generation API Key
      - key: DEAPI_API_KEY
        value: 3751|uCGk2V1KNsYc1pwOmWAhz2y4IJIt65BsJuXLUYQmfee6809f
        sync: false
      
      # Stable Horde Image Generation API Key
      - key: STABLE_HORDE_API_KEY
        value: 0da65d6c-00fb-4731-8424-9574cc5bf318
        sync: false
    
    # Disk storage for uploaded files and generated images
    disk:
      name: uploads
      mountPath: /opt/render/project/uploads
      sizeGB: 5
    
    autoDeploy: true
    
    logging:
      format: json
      level: info